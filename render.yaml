# Note: Environment variables (GEMINI_API_KEY, CORS_ORIGIN) are not synced from code.
# They must be entered manually in the Render dashboard under "Environment Variables".
services:
  - type: web
    name: roof-junction-chatbot
    runtime: python
    rootDir: chatbot-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
